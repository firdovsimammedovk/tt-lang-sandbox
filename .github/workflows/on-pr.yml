name: On PR

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: ["main"]

permissions:
  checks: write
  pull-requests: write
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    uses: ./.github/workflows/call-pre-commit.yml
    secrets: inherit

  check-tt-metal-version:
    name: Verify tt-metal version (third-party/tt-metal-version)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - run: .github/scripts/check-tt-metal-version.sh

  detect-uplift:
    name: Detect submodule / base-image changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      uplift: ${{ steps.detect.outputs.uplift }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false
      - id: detect
        run: .github/scripts/detect-uplift.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

  build:
    needs: detect-uplift
    uses: ./.github/workflows/call-build.yml
    secrets: inherit
    with:
      docker_tag: "v1.0.2"
      build_toolchain: ${{ needs.detect-uplift.outputs.uplift == 'true' }}

  test-sim:
    uses: ./.github/workflows/call-test-sim.yml
    secrets: inherit

  check-all-green:
    if: always()
    needs:
      - pre-commit
      - check-tt-metal-version
      - detect-uplift
      - build
      - test-sim
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether all needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          allowed-skips: build, test-sim
          jobs: ${{ toJSON(needs) }}
