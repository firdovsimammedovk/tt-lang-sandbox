name: On Push

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  checks: write
  contents: read
  packages: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    uses: ./.github/workflows/call-pre-commit.yml
    secrets: inherit

  check-tt-metal-version:
    name: Verify tt-metal version (third-party/tt-metal-version)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - run: .github/scripts/check-tt-metal-version.sh

  detect-uplift:
    name: Detect submodule / base-image changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      uplift: ${{ steps.detect.outputs.uplift }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false
      - id: detect
        run: |
          BASE="${{ github.event.before }}"
          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            BASE=$(git rev-parse HEAD~1)
          fi
          .github/scripts/detect-uplift.sh "$BASE" "${{ github.event.after }}"

  build:
    needs: detect-uplift
    uses: ./.github/workflows/call-build.yml
    secrets: inherit
    with:
      build_docs: ${{ github.ref == 'refs/heads/main' }}
      docker_tag: "v1.0.3"
      build_toolchain: ${{ needs.detect-uplift.outputs.uplift == 'true' }}

  test-sim:
    uses: ./.github/workflows/call-test-sim.yml
    secrets: inherit

  deploy-docs:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  check-all-green:
    if: always()
    needs:
      - pre-commit
      - check-tt-metal-version
      - detect-uplift
      - build
      - test-sim
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether all needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
