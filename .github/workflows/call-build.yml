name: Build tt-lang

on:
    workflow_dispatch:
        inputs:
            build_docs:
                description: "Build and deploy documentation."
                type: boolean
                default: false
            docker_tag:
                description: "Docker image tag for the ird container."
                type: string
                required: true
    workflow_call:
        inputs:
            build_docs:
                description: "Build and deploy documentation."
                type: boolean
                required: false
                default: false
            docker_tag:
                description: "Docker image tag for the ird container."
                type: string
                required: true

permissions:
    checks: write
    contents: read
    packages: read

jobs:
    build-tt-lang:
        name: "Build and test tt-lang"
        runs-on: ubuntu-22.04
        timeout-minutes: 60

        container:
            image: ghcr.io/tenstorrent/tt-lang/tt-lang-ird-ubuntu-22-04:${{ inputs.docker_tag }}

        defaults:
            run:
                shell: bash

        steps:
            - name: Checkout tt-lang
              uses: actions/checkout@v6
              with:
                  fetch-depth: 1

            - name: Fix git safe directory for submodules
              run: git config --global --add safe.directory '*'

            - name: Set extra CMake options
              if: inputs.build_docs
              run: echo "CMAKE_EXTRA_CONFIG_OPTIONS=-DTTLANG_ENABLE_DOCS=ON" >> "$GITHUB_ENV"

            - name: Configure tt-lang
              run: |
                  cmake -G Ninja -B build \
                      -DCMAKE_BUILD_TYPE=Release \
                      -DTTLANG_USE_TOOLCHAIN=ON \
                      -DTTLANG_ENABLE_PERF_TRACE=ON \
                      $CMAKE_EXTRA_CONFIG_OPTIONS

            - name: Setup ccache
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                  key: Linux-ttlang-build
                  max-size: 200M

            - name: Build tt-lang
              run: |
                  source build/env/activate
                  cmake --build build

            - name: Smoketest
              run: |
                  source build/env/activate
                  python test/python/smoketest.py

            - name: Run ttlang Lit MLIR tests
              run: |
                  source build/env/activate
                  cmake --build build --target check-ttlang-mlir

            - name: Run ttlang Python bindings tests
              run: |
                  source build/env/activate
                  cmake --build build --target check-ttlang-python-bindings

            - name: Run ttlang packaging tests
              run: |
                  source build/env/activate
                  cmake --build build --target check-ttlang-packaging

            - name: Python lit tests
              run: |
                  source build/env/activate
                  cmake --build build --target check-ttlang-python-lit

            - name: Build documentation
              if: inputs.build_docs
              run: |
                  source build/env/activate
                  cmake --build build --target ttlang-docs

            - name: Upload documentation artifact
              if: inputs.build_docs
              uses: actions/upload-pages-artifact@v5
              with:
                  path: ./build/docs/sphinx/_build/html

    test-hardware:
        uses: ./.github/workflows/call-test-hardware.yml
        secrets: inherit
        with:
            runs-on: n150
            timeout: 90
            docker_tag: ${{ inputs.docker_tag }}
