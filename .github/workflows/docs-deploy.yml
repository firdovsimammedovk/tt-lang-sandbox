name: Docs - Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      # OpenSearch-backed docs search ingest (see scripts/index_remote_search.py).
      SEARCH_API_BASE: https://csl860x2oj.execute-api.us-east-2.amazonaws.com/prod
      DOC_CATALOG_SOURCE_ID: docs-tenstorrent
      DOC_SITE_BASE_URL: https://firdovsimammedovk.github.io/tt-lang-sandbox
      DOCS_ID_NAMESPACE: tt-lang
      DOCS_INDEX_VERSION: latest
      DOCS_OUTPUT_DIR: docs/output
      DOCS_SEARCH_INGEST_API_KEY: ${{ secrets.DOCS_SEARCH_INGEST_API_KEY_DOCS_TENSTORRENT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build docs
        run: |
          mkdir -p docs/output
          sphinx-build docs/sphinx docs/output
          touch docs/output/.nojekyll

      - name: Warn if remote search ingest key is missing
        if: ${{ env.DOCS_SEARCH_INGEST_API_KEY == '' }}
        run: echo "::warning::Skipping OpenSearch indexing because DOCS_SEARCH_INGEST_API_KEY is not set."

      - name: Index docs into OpenSearch
        if: ${{ env.DOCS_SEARCH_INGEST_API_KEY != '' }}
        run: python scripts/index_remote_search.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
