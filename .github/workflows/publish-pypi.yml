name: Publish to PyPI

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+\+*'
  workflow_dispatch:
    inputs:
      docker_tag:
        description: "Docker image tag for the ird container."
        type: string
        required: true
      dry_run:
        description: "Skip tag enforcement and the PyPI upload (for pipeline testing)."
        type: boolean
        default: false
      allow_branch_publish:
        description: "TEMPORARY: skip tag enforcement and publish to real PyPI from a branch. The wheel must already carry a unique PEP 440 version (e.g. X.Y.ZrcN, X.Y.Z.devN) — PyPI rejects re-uploads of an existing version."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  preflight:
    name: "Verify release tag"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag_version: ${{ steps.parse.outputs.tag_version }}
    steps:
      - name: Checkout tt-lang
        uses: actions/checkout@v6

      - name: Echo dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "dry_run=${{ inputs.dry_run }}"
          echo "allow_branch_publish=${{ inputs.allow_branch_publish }}"
          echo "docker_tag=${{ inputs.docker_tag }}"

      - name: Require release tag
        id: parse
        if: ${{ github.event_name == 'push' || (inputs.dry_run != true && inputs.allow_branch_publish != true) }}
        run: .github/scripts/require-release-tag.sh

  build-docker:
    needs: preflight
    if: ${{ github.event_name == 'push' || inputs.docker_tag == '' }}
    permissions:
      contents: read
      packages: write
      checks: write
    uses: ./.github/workflows/call-build-docker.yml
    secrets: inherit

  build-wheels:
    needs: [preflight, build-docker]
    if: ${{ always() && needs.preflight.result == 'success' && (needs.build-docker.result == 'success' || needs.build-docker.result == 'skipped') }}
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/call-build-wheels.yml
    with:
      docker_tag: ${{ (github.event_name == 'workflow_dispatch' && inputs.docker_tag != '' && inputs.docker_tag) || needs.build-docker.outputs.docker-tag }}

  publish:
    name: "Publish to PyPI"
    needs: [preflight, build-wheels]
    if: ${{ github.event_name == 'push' || inputs.dry_run != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Checkout tt-lang
        uses: actions/checkout@v6

      - name: Download wheels
        uses: actions/download-artifact@v6
        with:
          name: tt-lang-wheels
          path: dist/

      - name: List wheels
        run: ls -lh dist/

      - name: Verify wheel version matches tag
        if: ${{ inputs.allow_branch_publish != true }}
        run: .github/scripts/verify-wheel-version.sh "${{ needs.preflight.outputs.tag_version }}" dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  dry-run-summary:
    name: "Dry-run summary"
    needs: [preflight, build-wheels]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v6
        with:
          name: tt-lang-wheels
          path: dist/

      - name: Summarize
        run: |
          echo "::notice::Dry run complete; no upload performed."
          echo "Wheels that would have been published:"
          ls -lh dist/
